<!doctype html>
<html lang="en">
	<head>
		<meta charset="UTF-8" />
		<link rel="icon" type="image/svg+xml" href="/vite.svg" />
		<meta name="viewport" content="width=device-width, initial-scale=1.0" />
		<title>AlgDatViz — Algorithm Visualizer</title>
		<!-- Anti-flash: set data-theme before first paint so the page never flashes
		     the wrong theme. Mirrors the logic in src/hooks/useTheme.js. -->
		<script>
			(function () {
				try {
					var stored = localStorage.getItem('algdatviz:theme');
					var theme =
						stored === 'light' || stored === 'dark'
							? stored
							: window.matchMedia &&
								  window.matchMedia('(prefers-color-scheme: dark)').matches
								? 'dark'
								: 'light';
					document.documentElement.dataset.theme = theme;
				} catch (e) {
					document.documentElement.dataset.theme = 'dark';
				}
			})();
		</script>
		<link rel="preconnect" href="https://fonts.googleapis.com" />
		<link rel="preconnect" href="https://fonts.gstatic.com" crossorigin />
		<link
			href="https://fonts.googleapis.com/css2?family=Bricolage+Grotesque:opsz,wght@12..96,400..800&family=Inter:wght@400;500;600;700&family=JetBrains+Mono:wght@400;500;600&display=swap"
			rel="stylesheet"
		/>
	</head>
	<body>
		<div id="root"></div>
		<script type="module" src="/src/main.jsx"></script>
	</body>
</html>
